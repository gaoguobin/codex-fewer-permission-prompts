name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.9", "3.11", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: python -m pip install --upgrade pip tomli

      - name: Install package
        run: python -m pip install --editable .

      - name: Compile sources
        run: python -m compileall -q src scripts tests skills/codex-fewer-permission-prompts/scripts

      - name: Check metadata and discovery files
        run: python scripts/check_metadata.py

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Check CLI entrypoints
        run: |
          python -m codex_fewer_permission_prompts --help
          python -m codex_fewer_permission_prompts doctor --codex-home ./.ci-codex-home --json

      - name: Build wheel
        run: python -m pip wheel --no-deps --wheel-dir dist .
